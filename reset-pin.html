<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reset PIN - Surjya Bakery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }

body{
  min-height:100vh; display:flex; justify-content:center; align-items:center;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);
  background-size: 400% 400%; animation: bgMove 12s ease infinite;
  color:white; overflow:hidden;
}

@keyframes bgMove{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

.reset-box{
  width:340px; padding:40px 25px; border-radius:28px;
  backdrop-filter:blur(30px); background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.3); text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,0.35); animation:fadeUp 0.7s ease;
}

@keyframes fadeUp{ from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);} }

h2{ margin-bottom:25px; font-weight:700; font-size:22px; }

input{
  width:100%; padding:14px; margin:8px 0; border-radius:16px; border:none; outline:none;
  font-size:16px; background:rgba(255,255,255,0.25); color:white; text-align:center; letter-spacing: 5px;
}

input::placeholder{ color:rgba(255,255,255,0.8); letter-spacing: normal; }

button{
  width:100%; padding:14px; margin-top:10px; border:none; border-radius:16px;
  font-size:15px; font-weight:600; cursor:pointer; transition:0.3s;
}

.update-btn{ background:#2ecc71; color:white; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
.back-btn{ background:rgba(255,255,255,0.2); color:white; margin-top: 15px; }

.message{ margin-top:14px; font-size:13px; font-weight: 500; }
.success{ color:#2ecc71; }
.error{ color:#ff4d4d; }
</style>
</head>

<body>

<div class="reset-box">
  <i class="fa-solid fa-shield-halved" style="font-size: 40px; margin-bottom: 15px;"></i>
  <h2>Security Settings</h2>

  <input type="password" id="oldPin" placeholder="Enter Old PIN" inputmode="numeric" maxlength="4">
  <input type="password" id="newPin" placeholder="New 4-Digit PIN" inputmode="numeric" maxlength="4">
  <input type="password" id="confirmPin" placeholder="Confirm New PIN" inputmode="numeric" maxlength="4">

  <button class="update-btn" onclick="savePin()">Update Admin PIN</button>
  <button class="back-btn" onclick="goBack()">Back to Login</button>

  <div id="message" class="message"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBjETFSgZsMDw1JRI0fIcUNMCMOHxBMaLA",
  authDomain: "billingbuddy-551f9.firebaseapp.com",
  projectId: "billingbuddy-551f9",
  appId: "1:287026017084:web:aae879570ad706e5a2a439"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messageBox = document.getElementById("message");

window.savePin = async function(){
  const oldPin = document.getElementById("oldPin").value.trim();
  const newPin = document.getElementById("newPin").value.trim();
  const confirmPin = document.getElementById("confirmPin").value.trim();

  // Reset Message
  messageBox.innerText = "Processing...";
  messageBox.className = "message";

  // Validation
  if(!oldPin || !newPin || !confirmPin) {
    showError("Please fill all fields");
    return;
  }
  if(newPin.length !== 4) {
    showError("PIN must be 4 digits");
    return;
  }
  if(newPin !== confirmPin) {
    showError("Confirm PIN doesn't match");
    return;
  }

  try {
    const adminRef = doc(db, "settings", "admin");
    const adminSnap = await getDoc(adminRef);

    if(!adminSnap.exists()){
      showError("System error: Admin not found");
      return;
    }

    const currentSavedPin = String(adminSnap.data().pin);

    // Verify Old PIN
    if(oldPin !== currentSavedPin) {
      showError("Incorrect Old PIN");
      return;
    }

    // Update PIN in Cloud
    await updateDoc(adminRef, { pin: newPin });

    messageBox.className = "message success";
    messageBox.innerText = "PIN Updated Successfully!";

    // Redirect after 1.5 seconds
    setTimeout(() => {
      window.location.replace("index.html");
    }, 1500);

  } catch (err) {
    console.error(err);
    showError("Cloud Sync Failed");
  }
};

function showError(text) {
  messageBox.className = "message error";
  messageBox.innerText = text;
}

window.goBack = function() {
  window.location.replace("index.html");
};
</script>

</body>
</html>
