<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cart - Surjya Bakery</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        body{
            background: linear-gradient(135deg,#667eea,#764ba2,#ec4899);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            color: #fff; height: 100vh; overflow: hidden;
        }
        @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        .app{ display: flex; height: 100vh; }
        
        /* SIDEBAR */
        .sidebar{
            width: 260px; backdrop-filter: blur(20px); background: rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.2); padding: 20px 15px;
            display: flex; flex-direction: column; position: fixed; height: 100%; z-index: 1000;
        }
        .menu{ list-style: none; margin-top: 20px; }
        .menu li{
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 8px; cursor: pointer; transition: 0.3s; opacity: 0.8;
        }
        .menu li:hover, .menu li.active{ background: rgba(255,255,255,0.2); opacity: 1; }

        /* CONTENT */
        .content{ flex: 1; padding: 30px; margin-left: 260px; overflow-y: auto; padding-bottom: 120px; }
        .top-header{ display: flex; justify-content: space-between; align-items: center; margin-top: 75px; margin-bottom: 30px;}
        .back-btn{ background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* CART ITEMS */
        .cart-item{
            background: rgba(255,255,255,0.12); padding: 20px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .item-actions { display: flex; align-items: center; gap: 20px; }
        .qty-controls { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 5px; }
        .qty-btn { width: 35px; height: 35px; border: none; border-radius: 10px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-size: 18px; }
        .qty-val { width: 40px; text-align: center; font-weight: bold; }
        .remove-btn { color: #ff6b81; background: none; border: none; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .remove-btn:active { transform: scale(0.8); }

        /* FOOTER */
        .cart-footer {
            position: fixed; bottom: 0; right: 0; left: 260px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(30px);
            padding: 20px 40px; border-top: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .total-info h2 { font-size: 24px; color: #2ecc71; }
        .checkout-actions { display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-clear { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-checkout { background: #2ecc71; color: white; }
        .btn:active { transform: scale(0.95); }

        .empty-state { text-align: center; margin-top: 100px; opacity: 0.6; }

        @media(max-width: 768px){
            .sidebar{ display: none; }
            .content{ margin-left: 0; padding: 20px; }
            .cart-footer { left: 0; padding: 15px 20px; flex-direction: column; gap: 15px; }
            .checkout-actions { width: 100%; }
            .btn { flex: 1; }
        }
    </style>
</head>

<body>

<div class="app">
    <aside class="sidebar">
        <div style="padding: 10px; text-align: center;"><h3>SURJYA BAKERY</h3></div>
        <ul class="menu">
            <li onclick="go('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li onclick="go('items.html')"><i class="fa-solid fa-box"></i> Items</li>
            <li class="active" onclick="go('cart.html')"><i class="fa-solid fa-cart-shopping"></i> Cart</li>
            <li onclick="go('invoice.html')"><i class="fa-solid fa-receipt"></i> Invoice</li>
            <li onclick="go('orders.html')"><i class="fa-solid fa-list"></i> Orders</li>
        </ul>
    </aside>

    <main class="content">
        <header class="top-header">
            <button class="back-btn" onclick="go('items.html')">
                <i class="fa-solid fa-arrow-left"></i> Items
            </button>
            <h2>🛒 My Cart</h2>
            <div style="width: 50px;"></div> 
        </header>

        <div class="cart-container" id="cartContainer">
            </div>
    </main>

    <div class="cart-footer" id="cartFooter">
        <div class="total-info">
            <p style="opacity: 0.7; font-size: 14px;">Grand Total</p>
            <h2 id="grandTotalDisplay">₹ 0</h2>
        </div>
        <div class="checkout-actions">
            <button class="btn btn-clear" onclick="clearCart()">Clear Cart</button>
            <button class="btn btn-checkout" onclick="checkout()">
                Checkout <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
    function go(page) { window.location.href = page; }
    
    // Global Cart Data
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function renderCart() {
        const container = document.getElementById("cartContainer");
        const footer = document.getElementById("cartFooter");
        container.innerHTML = "";
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-cart-ghost" style="font-size:80px; margin-bottom:20px; display:block;"></i>
                    <h3>Your cart is empty</h3>
                    <p>Pehle Items page se kuch add karein!</p>
                </div>`;
            footer.style.display = "none";
            return;
        }

        footer.style.display = "flex";
        let total = 0;

        cart.forEach((item, index) => {
            let price = parseFloat(item.price) || 0;
            let qty = parseInt(item.qty) || 1;
            total += (price * qty);

            const itemDiv = document.createElement("div");
            itemDiv.className = "cart-item";
            itemDiv.innerHTML = `
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <p>₹${price} / unit</p>
                </div>
                <div class="item-actions">
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                        <div class="qty-val">${qty}</div>
                        <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `;
            container.appendChild(itemDiv);
        });

        document.getElementById("grandTotalDisplay").innerText = "₹ " + total.toLocaleString();
    }

    function updateQty(index, change) {
        cart[index].qty = (parseInt(cart[index].qty) || 1) + change;
        if (cart[index].qty < 1) {
            removeItem(index);
        } else {
            saveAndRefresh();
        }
    }

    function removeItem(index) {
        if(confirm("Ye item nikal dein?")) {
            cart.splice(index, 1); // Delete from array
            saveAndRefresh();      // Save and Update UI
        }
    }

    function clearCart() {
        if(confirm("Pura cart khali karna hai?")) {
            cart = [];        // Empty array
            saveAndRefresh(); // Save and Update UI
        }
    }

    function saveAndRefresh() {
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart(); // This refreshes the list on screen
    }

    function checkout() {
        if(cart.length === 0) return;

        let finalTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        let orderID = Math.floor(1000 + Math.random() * 9000);

        // Save to Orders
        let orders = JSON.parse(localStorage.getItem("orders")) || [];
        orders.unshift({
            id: orderID,
            date: new Date().toLocaleString(),
            items: [...cart],
            total: finalTotal,
            status: "Pending"
        });
        localStorage.setItem("orders", JSON.stringify(orders));

        // Save to Records
        let records = JSON.parse(localStorage.getItem("bakeryRecords")) || [];
        records.push({
            title: "Order #" + orderID,
            amount: finalTotal,
            date: new Date().toISOString().split('T')[0],
            type: "income"
        });
        localStorage.setItem("bakeryRecords", JSON.stringify(records));
        
        // Final Clean up
        cart = [];
        saveAndRefresh();
        
        alert("🎉 Order Successful!");
        window.location.href = "orders.html";
    }

    // Load initial data
    renderCart();
</script>

</body>
</html>
