<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Item Details - Surjya Bakery Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        body{ background: linear-gradient(135deg,#1e293b,#0f172a,#1e1b4b); background-size: 400% 400%; animation: bgMove 15s ease infinite; color: #fff; height: 100vh; overflow: hidden; }
        @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        .app{ display: flex; height: 100vh; }
        .sidebar{ width: 260px; backdrop-filter: blur(20px); background: rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px 15px; display: flex; flex-direction: column; height: 100%; }
        .profile{ display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding: 10px; }
        .logo{ width: 40px; height: 40px; border-radius: 10px; }
        .menu{ list-style: none; flex-grow: 1; }
        .menu li{ display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; opacity: 0.7; font-size: 14px; margin-bottom: 5px; }
        .menu li:hover, .menu li.active{ background: #3b82f6; opacity: 1; color: #fff; }
        .content{ flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .top-header{ width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn{ background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .details-card{ background: rgba(30, 41, 59, 0.7); width: 100%; max-width: 450px; padding: 30px 25px; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; position: relative; }
        .edit-input-name { background: rgba(0,0,0,0.3); border: 1px solid #3b82f6; color: #fff; font-size: 24px; font-weight: 700; width: 100%; text-align: center; border-radius: 10px; padding: 5px; margin: 10px 0 25px 0; outline: none; }
        .edit-input-price { background: rgba(0,0,0,0.3); border: 1px solid #4ade80; color: #4ade80; font-size: 24px; font-weight: 700; width: 120px; text-align: center; border-radius: 8px; padding: 2px 5px; outline: none; }
        .trend-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #4ade80; color: #064e3b; font-size: 11px; padding: 6px 15px; border-radius: 50px; font-weight: 800; }
        .info-box { background: rgba(15, 23, 42, 0.5); border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-row span { font-size: 14px; color: #94a3b8; }
        .stock-control { display: flex; align-items: center; gap: 10px; background: rgba(59, 130, 246, 0.1); padding: 5px; border-radius: 12px; }
        .stock-btn { width: 35px; height: 35px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; cursor: pointer; font-size: 20px; }
        .stock-input { width: 60px; background: transparent; border: none; color: white; text-align: center; font-size: 20px; font-weight: 800; outline: none; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-update { background: #3b82f6; color: white; grid-column: span 2; }
        .btn-edit { background: rgba(255,255,255,0.05); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.2); }
        .btn-del { background: rgba(255, 107, 129, 0.05); color: #ff6b81; border: 1px solid rgba(255, 107, 129, 0.2); }
        @media(max-width: 768px){ .sidebar{ display: none; } .content{ padding: 15px; } }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="profile">
            <img src="https://raw.githubusercontent.com/pritam-creator/billingbuddy-assets/refs/heads/main/Untitled.png" class="logo">
            <div class="profile-info"><h4>Surjya Bakery</h4><p>Admin</p></div>
        </div>
        <ul class="menu">
            <li onclick="go('dashboard.html')"><i class="fa-solid fa-house"></i> Dashboard</li>
            <li class="active" onclick="go('inventory.html')"><i class="fa-solid fa-cookie-bite"></i> Inventory</li>
            <li onclick="go('pos.html')"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</li>
        </ul>
    </aside>

    <main class="content">
        <header class="top-header">
            <button class="back-btn" onclick="go('inventory.html')"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="headerTitle">Product Detail</h2>
            <div style="width: 40px;"></div> 
        </header>

        <div class="details-card">
            <div class="trend-badge" id="trendBadge">STOCK CHECKING...</div>
            
            <div id="nameContainer">
                <h2 id="detName">Loading...</h2>
            </div>
            
            <div class="info-box">
                <div class="info-row">
                    <span>Price (Rate)</span>
                    <div id="priceContainer">
                        <b id="detPrice" style="color: #4ade80; font-size: 24px;">₹ 0.00</b>
                    </div>
                </div>
                <div class="info-row">
                    <span>In Stock</span>
                    <div class="stock-control">
                        <button class="stock-btn" onclick="updateStock(-1)">−</button>
                        <input type="number" id="detStockValue" class="stock-input" value="0">
                        <button class="stock-btn" onclick="updateStock(1)">+</button>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-update" id="mainUpdateBtn" onclick="saveChanges()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Update Cloud
                </button>
                <button class="btn btn-edit" id="editBtn" onclick="toggleEdit()">
                    <i class="fa-solid fa-pen-to-square"></i> Edit
                </button>
                <button class="btn btn-del" onclick="deleteItem()">
                    <i class="fa-solid fa-trash"></i> Delete
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBjETFSgZsMDw1JRI0fIcUNMCMOHxBMaLA",
        authDomain: "billingbuddy-551f9.firebaseapp.com",
        projectId: "billingbuddy-551f9",
        appId: "1:287026017084:web:aae879570ad706e5a2a439"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id'); // Firestore Document ID
    
    let currentItem = null;
    let isEditing = false;

    // Load Live Data from Firestore
    if(itemId) {
        db.collection("inventory").doc(itemId).onSnapshot((doc) => {
            if(doc.exists) {
                currentItem = { id: doc.id, ...doc.data() };
                if(!isEditing) refreshUI();
            } else {
                alert("Item not found!");
                go('inventory.html');
            }
        });
    }

    function refreshUI() {
        document.getElementById("detName").innerText = currentItem.name;
        document.getElementById("detPrice").innerText = "₹ " + parseFloat(currentItem.price).toFixed(2);
        document.getElementById("detStockValue").value = currentItem.stock || 0;
        
        const badge = document.getElementById("trendBadge");
        const isLow = currentItem.stock <= (currentItem.minLevel || 5);
        badge.innerText = isLow ? "⚠️ LOW STOCK" : "✅ HEALTHY STOCK";
        badge.style.background = isLow ? "#ef4444" : "#4ade80";
        badge.style.color = isLow ? "#fff" : "#064e3b";
    }

    function updateStock(val) {
        const input = document.getElementById("detStockValue");
        input.value = Math.max(0, parseInt(input.value) + val);
    }

    function toggleEdit() {
        isEditing = !isEditing;
        const nameContainer = document.getElementById("nameContainer");
        const priceContainer = document.getElementById("priceContainer");
        const editBtn = document.getElementById("editBtn");

        if (isEditing) {
            nameContainer.innerHTML = `<input type="text" id="editName" class="edit-input-name" value="${currentItem.name}">`;
            priceContainer.innerHTML = `<input type="number" id="editPrice" class="edit-input-price" value="${currentItem.price}">`;
            editBtn.innerHTML = `<i class="fa-solid fa-xmark"></i> Cancel`;
        } else {
            refreshUI();
            editBtn.innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Edit`;
        }
    }

    async function saveChanges() {
        const stock = parseInt(document.getElementById("detStockValue").value);
        let name = currentItem.name;
        let price = currentItem.price;

        if (isEditing) {
            name = document.getElementById("editName").value.trim();
            price = parseFloat(document.getElementById("editPrice").value);
        }

        if (!name || isNaN(price)) return alert("Invalid details!");

        const btn = document.getElementById("mainUpdateBtn");
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Syncing...";

        try {
            await db.collection("inventory").doc(itemId).update({
                name: name,
                price: price,
                stock: stock,
                lastUpdate: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });

            btn.style.background = "#10b981";
            btn.innerHTML = "<i class='fa-solid fa-check'></i> Updated!";
            setTimeout(() => go('inventory.html'), 800);
        } catch (e) {
            alert("Error: " + e.message);
            btn.innerHTML = "Retry Update";
        }
    }

    async function deleteItem() {
        if(confirm("Are you sure you want to delete this item forever?")) {
            await db.collection("inventory").doc(itemId).delete();
            go('inventory.html');
        }
    }

    function go(page) { window.location.href = page; }
</script>

</body>
</html>
