<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Item Details - Surjya Bakery</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== CONSISTENT THEME ===== */
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

        body{
            background: linear-gradient(135deg,#667eea,#764ba2,#ec4899);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

        .app{ display: flex; height: 100vh; }

        /* SIDEBAR (Desktop Only) */
        .sidebar{
            width: 260px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            transition: 0.3s ease;
            z-index: 1000;
        }

        .menu{ list-style: none; margin-top: 20px; }
        .menu li{
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 8px; cursor: pointer; transition: 0.3s; opacity: 0.8;
        }
        .menu li:hover, .menu li.active{ background: rgba(255,255,255,0.2); opacity: 1; }

        /* MAIN CONTENT */
        .content{ flex: 1; padding: 30px; margin-left: 260px; overflow-y: auto; padding-bottom: 100px; }

        /* HEADER */
        .top-header{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn{ background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        /* DETAILS CARD */
        .details-card{
            background: rgba(255,255,255,0.15);
            padding: 30px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: 0 auto;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp{ from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

        .details-card h2{ font-size: 28px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .info-row{ display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; }
        .low-stock{ color: #ff4d4d; font-weight: bold; background: rgba(255,0,0,0.1); padding: 2px 8px; border-radius: 5px; }

        /* ACTION BUTTONS */
        .actions{ display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn{ padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add{ background: #2ecc71; color: white; grid-column: span 2; }
        .btn-edit{ background: #f1c40f; color: #333; }
        .btn-delete{ background: #e74c3c; color: white; }
        .btn:active{ transform: scale(0.95); }

        /* BOTTOM NAV (Mobile Only) */
        .bottom-nav{
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
            display: none; justify-content: space-around; padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000;
        }
        .nav-item{ text-align: center; color: white; opacity: 0.7; cursor: pointer; font-size: 20px; }
        .nav-item.active{ opacity: 1; color: #fff; }
        .nav-item span{ display: block; font-size: 10px; margin-top: 4px; }

        @media(max-width: 768px){
            .sidebar{ display: none; }
            .content{ margin-left: 0; padding: 20px; }
            .bottom-nav{ display: flex; }
        }
    </style>
</head>

<body>

<div class="app">
    <aside class="sidebar">
        <div style="padding: 10px; text-align: center;">
            <h3 style="letter-spacing: 1px;">SURJYA BAKERY</h3>
        </div>
        <ul class="menu">
            <li onclick="go('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li class="active" onclick="go('items.html')"><i class="fa-solid fa-box"></i> Items</li>
            <li onclick="go('invoice.html')"><i class="fa-solid fa-receipt"></i> Invoice</li>
            <li onclick="go('orders.html')"><i class="fa-solid fa-list"></i> Orders</li>
            <li onclick="go('logout()')"><i class="fa-solid fa-right-from-bracket"></i> Logout</li>
        </ul>
    </aside>

    <main class="content">
        <header class="top-header">
            <button class="back-btn" onclick="go('items.html')">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <h3 id="itemNameHeader">Item Details</h3>
            <div style="width: 40px;"></div> </header>

        <div class="details-card">
            <h2 id="detName">Loading...</h2>
            
            <div class="info-row">
                <span>Price:</span>
                <span id="detPrice" style="color: #2ecc71; font-weight: bold;">₹ 0</span>
            </div>

            <div class="info-row">
                <span>Stock Status:</span>
                <span id="detStock">--</span>
            </div>

            <div class="actions">
                <button class="btn btn-add" onclick="addToCart()">
                    <i class="fa-solid fa-cart-plus"></i> Add to Cart
                </button>
                <button class="btn btn-edit" onclick="editItem()">
                    <i class="fa-solid fa-pen-to-square"></i> Edit
                </button>
                <button class="btn btn-delete" onclick="deleteItem()">
                    <i class="fa-solid fa-trash"></i> Delete
                </button>
            </div>
        </div>
    </main>
</div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="go('dashboard.html')"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item active" onclick="go('items.html')"><i class="fa-solid fa-box"></i><span>Items</span></div>
    <div class="nav-item" onclick="go('invoice.html')"><i class="fa-solid fa-receipt"></i><span>Billing</span></div>
    <div class="nav-item" onclick="go('orders.html')"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
</nav>

<script>
    // 1. Get ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');

    // 2. Fetch Item Data
    let items = JSON.parse(localStorage.getItem("items")) || [];
    let currentItem = items.find(i => i.id == itemId);

    // 3. Render Data
    if(currentItem) {
        document.getElementById("detName").innerText = currentItem.name;
        document.getElementById("detPrice").innerText = "₹ " + currentItem.price;
        document.getElementById("itemNameHeader").innerText = currentItem.name;
        
        // Demo stock logic
        let stockCount = Math.floor(Math.random() * 20); // Placeholder
        document.getElementById("detStock").innerHTML = stockCount < 5 
            ? `${stockCount} <span class="low-stock">Low Stock</span>` 
            : `${stockCount} In Stock`;
    } else {
        document.querySelector(".details-card").innerHTML = "<h3>Item not found!</h3>";
    }

    // 4. Navigation & Actions
    function go(page) {
        window.location.href = page;
    }

    function addToCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const existing = cart.find(i => i.id == itemId);
        
        if(existing) {
            existing.qty += 1;
        } else {
            cart.push({...currentItem, qty: 1});
        }
        
        localStorage.setItem("cart", JSON.stringify(cart));
        alert("Added to Cart! 🔥");
    }

    function editItem() {
        // Redirect to items page or open a modal
        alert("Editing functionality: " + currentItem.name);
    }

    function deleteItem() {
        if(confirm("Are you sure you want to delete this item?")) {
            items = items.filter(i => i.id != itemId);
            localStorage.setItem("items", JSON.stringify(items));
            window.location.href = "items.html";
        }
    }

    function logout() {
        localStorage.removeItem("loggedIn");
        window.location.replace("index.html");
    }
</script>

</body>
</html>
