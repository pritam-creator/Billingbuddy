<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Cloud Cash - Surjya Bakery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* (Styles kept exactly as your professional design for consistency) */
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        body{ background: linear-gradient(135deg,#1e293b,#0f172a,#1e1b4b); background-size: 400% 400%; animation: bgMove 15s ease infinite; color: #fff; height: 100vh; overflow: hidden; }
        @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        .app{ display: flex; height: 100vh; }
        .sidebar{ width: 260px; backdrop-filter: blur(20px); background: rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px 15px; display: flex; flex-direction: column; }
        .profile{ display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding: 10px; }
        .logo{ width: 40px; height: 40px; border-radius: 10px; }
        .menu{ list-style: none; flex-grow: 1; }
        .menu li{ display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 12px; cursor: pointer; opacity: 0.7; font-size: 14px; margin-bottom: 5px; }
        .menu li.active{ background: #3b82f6; opacity: 1; }
        .content{ flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
        .top-header{ width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn{ background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .summary-card{ background: rgba(30, 41, 59, 0.7); width: 100%; max-width: 500px; padding: 25px; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 25px; }
        .balance{ font-size: 36px; font-weight: 800; margin: 10px 0; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .stat-item p { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .income-text { color: #4ade80; }
        .expense-text { color: #ff6b81; }
        .records-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .record-item{ background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .type-icon { width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .income-bg { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
        .expense-bg { background: rgba(255, 107, 129, 0.1); color: #ff6b81; border: 1px solid rgba(255, 107, 129, 0.2); }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 20px; background: #3b82f6; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); cursor: pointer; z-index: 100; border: none; }
        @media(max-width: 768px){ .sidebar{ display: none; } }
    </style>
</head>

<body>
<div class="app">
    <aside class="sidebar">
        <div class="profile">
            <img src="https://raw.githubusercontent.com/pritam-creator/billingbuddy-assets/refs/heads/main/Untitled.png" class="logo">
            <div class="profile-info"><h4>Surjya Bakery</h4><p>Cash Manager</p></div>
        </div>
        <ul class="menu">
            <li onclick="go('dashboard.html')"><i class="fa-solid fa-house"></i> Dashboard</li>
            <li onclick="go('items.html')"><i class="fa-solid fa-cookie-bite"></i> Items</li>
            <li onclick="go('pos.html')"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</li>
            <li class="active"><i class="fa-solid fa-chart-line"></i> Records</li>
            <li onclick="go('ledger.html')"><i class="fa-solid fa-book"></i> Ledger</li>
        </ul>
    </aside>

    <main class="content">
        <header class="top-header">
            <button class="back-btn" onclick="go('dashboard.html')"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="dateDisplay" style="font-size: 16px; color: #94a3b8;">Loading...</h2>
            <div></div>
        </header>

        <div class="summary-card">
            <p style="font-size: 11px; color: #94a3b8;">NET CASH BALANCE</p>
            <div class="balance" id="balanceDisplay">₹ 0.00</div>
            <div class="mini-stats">
                <div class="stat-item">
                    <p>Total Income</p>
                    <b id="totalIncome" class="income-text">₹ 0</b>
                </div>
                <div class="stat-item">
                    <p>Total Expense</p>
                    <b id="totalExpense" class="expense-text">₹ 0</b>
                </div>
            </div>
        </div>

        <div class="records-container" id="recordList"></div>
    </main>

    <button class="fab" onclick="addManualRecord()"><i class="fa-solid fa-plus"></i></button>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBjETFSgZsMDw1JRI0fIcUNMCMOHxBMaLA",
        authDomain: "billingbuddy-551f9.firebaseapp.com",
        projectId: "billingbuddy-551f9",
        appId: "1:287026017084:web:aae879570ad706e5a2a439"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- REAL-TIME SYNC ---
    function init() {
        document.getElementById("dateDisplay").innerText = new Date().toLocaleDateString('en-IN', { day:'numeric', month: 'short', year: 'numeric' });
        
        db.collection("cashflow").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            render(snapshot);
        });
    }

    function render(snapshot) {
        const list = document.getElementById("recordList");
        let netBalance = 0;
        let incomeTotal = 0;
        let expenseTotal = 0;
        
        list.innerHTML = "";

        snapshot.forEach(doc => {
            const r = doc.data();
            const id = doc.id;
            const amount = parseFloat(r.amount);
            const isIncome = amount >= 0;

            netBalance += amount;
            if(isIncome) incomeTotal += amount;
            else expenseTotal += Math.abs(amount);

            list.innerHTML += `
                <div class="record-item">
                    <div style="display: flex; align-items: center;">
                        <div class="type-icon ${isIncome ? 'income-bg' : 'expense-bg'}">
                            <i class="fa-solid ${isIncome ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i>
                        </div>
                        <div class="record-info">
                            <h4>${r.title}</h4>
                            <span style="font-size:11px; color:#64748b;">${r.date}</span>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div class="amount-tag ${isIncome ? 'income-text' : 'expense-text'}" style="font-weight:700">
                            ${isIncome ? '+' : '-'}₹${Math.abs(amount).toLocaleString()}
                        </div>
                        <i class="fa-solid fa-trash-can" onclick="deleteRecord('${id}')" style="color:#475569; cursor:pointer;"></i>
                    </div>
                </div>
            `;
        });

        document.getElementById("balanceDisplay").innerText = "₹ " + netBalance.toLocaleString();
        document.getElementById("totalIncome").innerText = "₹ " + incomeTotal.toLocaleString();
        document.getElementById("totalExpense").innerText = "₹ " + expenseTotal.toLocaleString();
    }

    async function addManualRecord(){
        const title = prompt("Entry Name (e.g. Sales, Rent, Maida Bill):");
        if(!title) return;
        
        const amountStr = prompt("Amount (Kharch ke liye minus '-' lagaye, jaise -500):");
        if(!amountStr) return;
        const amount = parseFloat(amountStr) || 0;

        await db.collection("cashflow").add({
            title: title,
            amount: amount,
            date: new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short' }),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    async function deleteRecord(id){
        if(confirm("Delete this entry?")) {
            await db.collection("cashflow").doc(id).delete();
        }
    }

    function go(page){ window.location.href = page; }
    window.onload = init;
</script>
</body>
</html>
