<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - New Surjya Bakery</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== GLOBAL STYLES ===== */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        }

        body{
            background: linear-gradient(135deg,#667eea,#764ba2,#ec4899);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            transition: 0.3s ease;
            color: #fff;
            min-height: 100vh;
        }

        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .app{ display: flex; height: 100vh; overflow: hidden; }

        /* ===== SIDEBAR ===== */
        .sidebar{
            width: 260px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .profile{ display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding: 10px; }
        .profile-info h4 { font-size: 16px; font-weight: 600; }
        .profile-info p{ font-size: 12px; opacity: 0.7; }

        .menu{ list-style: none; flex-grow: 1; }

        .menu li{
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 5px;
            font-size: 15px;
            opacity: 0.8;
        }

        .menu li:hover{ 
            background: rgba(255,255,255,0.15); 
            opacity: 1;
            transform: translateX(5px);
        }

        /* Active Page Style */
        .menu li.active{
            background: rgba(255,255,255,0.25);
            border-left: 4px solid #fff;
            opacity: 1;
            font-weight: bold;
        }

        /* ===== MAIN CONTENT ===== */
        .content{
            flex: 1;
            padding: 30px;
            margin-left: 260px;
            overflow-y: auto;
            transition: 0.3s;
        }

        .top-header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-left{ display: flex; align-items: center; gap: 15px; }
        #menuBtn { 
            font-size: 22px; 
            cursor: pointer; 
            display: none; /* Desktop pe hidden */
        }

        .greeting{ font-size: 14px; opacity: 0.8; margin-top: 4px; }

        .action-buttons{ display: flex; gap: 12px; }

        .btn{
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            color: white;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover{ background: rgba(255,255,255,0.35); transform: translateY(-2px); }

        /* ===== CARDS ===== */
        .cards{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card{
            background: rgba(255,255,255,0.12);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover{ transform: translateY(-8px); background: rgba(255,255,255,0.18); }
        .card i{ font-size: 28px; margin-bottom: 15px; color: #fff; }
        .card h3{ font-size: 24px; margin-bottom: 5px; }
        .card p{ opacity: 0.8; font-size: 14px; }

        /* ===== UTILS ===== */
        .overlay{
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 900;
        }

        .overlay.active{ opacity: 1; pointer-events: all; }

        /* ===== MOBILE RESPONSIVE ===== */
        @media(max-width: 768px){
            .sidebar{ left: -260px; }
            .sidebar.active{ left: 0; }
            .content{ margin-left: 0; padding: 20px; }
            #menuBtn { display: block; }
        }

        /* ===== DARK MODE OVERRIDE ===== */
        body.dark{ background: #0f172a; }
        body.dark .sidebar{ background: rgba(15,23,42,0.95); }
        body.dark .card{ background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.05); }
        body.dark .btn{ background: rgba(148,163,184,0.15); }

        .logo{
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            animation: glow 2s infinite alternate;
            object-fit: cover;
        }

        @keyframes glow{
            from{ box-shadow: 0 0 10px rgba(255,255,255,0.3); }
            to{ box-shadow: 0 0 30px rgba(255,255,255,0.6); }
        }
    </style>
</head>

<body>

<script>
    /* SESSION PROTECTION */
    if(localStorage.getItem("loggedIn") !== "true"){
        window.location.replace("index.html");
    }
</script>

<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="profile">
            <img src="https://raw.githubusercontent.com/pritam-creator/billingbuddy-assets/refs/heads/main/Untitled.png" class="logo" alt="Logo">
            <div class="profile-info">
                <h4>Surjya Bakery</h4>
                <p>Admin Panel</p>
            </div>
        </div>

        <ul class="menu" id="mainMenu">
            <li data-page="dashboard.html" onclick="goPage('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li data-page="items.html" onclick="goPage('items.html')"><i class="fa-solid fa-box"></i> Items</li>
            <li data-page="invoice.html" onclick="goPage('invoice.html')"><i class="fa-solid fa-receipt"></i> Invoice</li>
            <li data-page="clients.html" onclick="goPage('clients.html')"><i class="fa-solid fa-users"></i> Clients</li>
            <li data-page="inventory.html" onclick="goPage('inventory.html')"><i class="fa-solid fa-warehouse"></i> Inventory</li>
            <li data-page="orders.html" onclick="goPage('orders.html')"><i class="fa-solid fa-list"></i> Orders</li>
            <li data-page="records.html" onclick="goPage('records.html')"><i class="fa-solid fa-chart-column"></i> Records</li>
            <li data-page="records.html" onclick="goPage('employees.html')"><i class="fa-solid fa-"></i> employees</li>
        </ul>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="content">
        <header class="top-header">
            <div class="header-left">
                <div id="menuBtn"><i class="fa-solid fa-bars-staggered"></i></div>
                <div>
                    <h2 id="pageTitle">Dashboard</h2>
                    <div class="greeting" id="greeting">Loading...</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn" id="darkToggle" title="Toggle Theme">🌙</button>
                <button class="btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </header>

        <div class="cards">
            <div class="card">
                <i class="fa-solid fa-indian-rupee-sign"></i>
                <h3 id="todaySales">₹0</h3>
                <p>Today Sales</p>
            </div>
            <div class="card">
                <i class="fa-solid fa-receipt"></i>
                <h3 id="ordersCount">0</h3>
                <p>Total Orders</p>
            </div>
            <div class="card">
                <i class="fa-solid fa-users"></i>
                <h3 id="clientsCount">0</h3>
                <p>Total Clients</p>
            </div>
        </div>
        
        </main>
</div>

<script>
    /* DARK MODE LOGIC */
    const darkToggle = document.getElementById("darkToggle");
    const isDark = localStorage.getItem("darkMode") === "true";

    if(isDark){
        document.body.classList.add("dark");
        darkToggle.innerText = "☀️";
    }

    darkToggle.onclick = () => {
        document.body.classList.toggle("dark");
        const currentlyDark = document.body.classList.contains("dark");
        localStorage.setItem("darkMode", currentlyDark);
        darkToggle.innerText = currentlyDark ? "☀️" : "🌙";
    };

    /* SIDEBAR & OVERLAY LOGIC */
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.onclick = () => {
        sidebar.classList.add("active");
        overlay.classList.add("active");
    };

    overlay.onclick = () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
    };

    /* NAVIGATION & ACTIVE STATE */
    function goPage(page){
        window.location.href = page;
    }

    function setActivePage() {
        const path = window.location.pathname;
        const page = path.split("/").pop() || "dashboard.html";
        const menuItems = document.querySelectorAll(".menu li");
        
        menuItems.forEach(item => {
            if(item.getAttribute("data-page") === page) {
                item.classList.add("active");
                // Update Header Title based on active page
                document.getElementById("pageTitle").innerText = item.innerText.trim();
            } else {
                item.classList.remove("active");
            }
        });
    }

    /* GREETING & CLOCK */
    function updateGreeting(){
        const now = new Date();
        const hour = now.getHours();
        let greet = "Good Evening 🌙";

        if(hour < 12) greet = "Good Morning ☀️";
        else if(hour < 18) greet = "Good Afternoon 🌤️";

        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById("greeting").innerText = 
            `${greet} | ${now.toLocaleDateString(undefined, options)} | ${now.toLocaleTimeString()}`;
    }
    function updateDashboard() {
    // Orders ka data uthao
    const orders = JSON.parse(localStorage.getItem("orders")) || [];
    const totalOrders = orders.length;
    
    // Total Sales calculate karo
    const sales = orders.reduce((sum, order) => sum + parseFloat(order.total || 0), 0);
    
    // UI update karo
    document.getElementById("dash-orders").innerText = totalOrders;
    document.getElementById("dash-sales").innerText = "₹ " + sales.toLocaleString();
}


    /* LOGOUT */
    document.getElementById("logoutBtn").onclick = () => {
        if(confirm("Are you sure you want to logout?")) {
            localStorage.removeItem("loggedIn");
            window.location.replace("index.html");
        }
    };

    // Initialize functions
    window.onload = () => {
        setActivePage();
        setInterval(updateGreeting, 1000);
        updateGreeting();
    };
</script>

</body>
</html>
