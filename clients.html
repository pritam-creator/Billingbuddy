<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

    <title>Clients - New Surjya Bakery</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== CONSISTENT THEME (Matches Dashboard) ===== */
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

        body{
            background: linear-gradient(135deg,#667eea,#764ba2,#ec4899);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

        .app{ display: flex; height: 100vh; }

        /* SIDEBAR (Desktop Only) */
        .sidebar{
            width: 260px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            transition: 0.3s ease;
            z-index: 1000;
        }

        .menu{ list-style: none; margin-top: 20px; }
        .menu li{
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 8px; cursor: pointer; transition: 0.3s; opacity: 0.8;
        }
        .menu li:hover{ background: rgba(255,255,255,0.2); opacity: 1; }
        .menu li.active{ background: rgba(255,255,255,0.25); border-left: 4px solid #fff; opacity: 1; }

        /* MAIN CONTENT */
        .content{ flex: 1; padding: 30px; margin-left: 260px; overflow-y: auto; padding-bottom: 120px; }

        /* HEADER */
        .top-header{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn{ background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* SUMMARY BOX */
        .summary{
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .summary h3{ font-size: 14px; opacity: 0.8; margin-bottom: 5px; }
        .total{ font-size: 28px; font-weight: 700; color: #fff; }

        /* CLIENT CARDS */
        #clientList { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .card{
            background: rgba(255,255,255,0.12);
            padding: 20px;
            border-radius: 18px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s;
            position: relative;
        }
        .card:hover{ transform: translateY(-5px); background: rgba(255,255,255,0.18); }
        .card h3{ font-size: 18px; margin-bottom: 10px; }
        
        .pending{ color: #ff6b81; font-weight: 600; background: rgba(255,107,129,0.1); padding: 4px 10px; border-radius: 6px; }
        .clear{ color: #2ecc71; font-weight: 600; background: rgba(46,204,113,0.1); padding: 4px 10px; border-radius: 6px; }

        .delete-btn{ 
            margin-top: 15px; width: 100%; padding: 8px; border: none; 
            background: rgba(231,76,60,0.2); color: #fff; border-radius: 8px; 
            cursor: pointer; transition: 0.3s; 
        }
        .delete-btn:hover{ background: rgba(231,76,60,0.8); }

        /* FLOATING ADD BUTTON */
        .add-btn{
            position: fixed; bottom: 100px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: #fff; color: #764ba2;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer; z-index: 100; transition: 0.3s;
        }
        .add-btn:hover{ transform: scale(1.1) rotate(90deg); }

        /* BOTTOM NAV (Mobile Only) */
        .bottom-nav{
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
            display: none; justify-content: space-around; padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000;
        }
        .nav-item{ text-align: center; color: white; opacity: 0.6; cursor: pointer; font-size: 20px; }
        .nav-item.active{ opacity: 1; font-weight: bold; }
        .nav-item span{ display: block; font-size: 10px; margin-top: 4px; }

        @media(max-width: 768px){
            .sidebar{ display: none; }
            .content{ margin-left: 0; padding: 20px; }
            .bottom-nav{ display: flex; }
        }
    </style>
</head>

<body>

<div class="app">
    <aside class="sidebar">
        <div style="padding: 10px; text-align: center;">
            <h3 style="letter-spacing: 1px; font-weight: 800;">NEW SURJYA</h3>
        </div>
        <ul class="menu">
            <li onclick="go('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li onclick="go('items.html')"><i class="fa-solid fa-box"></i> Items</li>
            <li onclick="go('invoice.html')"><i class="fa-solid fa-receipt"></i> Invoice</li>
            <li class="active"><i class="fa-solid fa-users"></i> Clients</li>
            <li onclick="go('orders.html')"><i class="fa-solid fa-list"></i> Orders</li>
            <li onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</li>
        </ul>
    </aside>

    <main class="content">
        <header class="top-header">
            <button class="back-btn" onclick="go('dashboard.html')">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <h2>👥 Client Directory</h2>
            <div style="width: 40px;"></div>
        </header>

        <div class="summary">
            <h3>Total Outstanding Balance</h3>
            <div class="total" id="totalAmount">₹ 0</div>
        </div>

        <div id="clientList">
            </div>
    </main>

    <div class="add-btn" onclick="addClient()">
        <i class="fa-solid fa-user-plus"></i>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="go('dashboard.html')"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="go('items.html')"><i class="fa-solid fa-box"></i><span>Items</span></div>
    <div class="nav-item active"><i class="fa-solid fa-users"></i><span>Clients</span></div>
    <div class="nav-item" onclick="go('orders.html')"><i class="fa-solid fa-list-check"></i><span>Orders</span></div>
</nav>

<script>
    /* 🔐 SESSION PROTECTION */
    if(localStorage.getItem("loggedIn") !== "true") window.location.replace("index.html");

    // Load data from LocalStorage
    let clients = JSON.parse(localStorage.getItem("clients")) || [
        {name: "Rahul Traders", due: 4500},
        {name: "Sunita Store", due: 0}
    ];

    function render(){
        const list = document.getElementById("clientList");
        let grandTotal = 0;
        list.innerHTML = "";

        if(clients.length === 0) {
            list.innerHTML = "<p style='grid-column: 1/-1; text-align: center; opacity: 0.6;'>No clients added yet.</p>";
        }

        clients.forEach((c, index) => {
            grandTotal += c.due;
            const statusClass = c.due > 0 ? 'pending' : 'clear';
            const statusText = c.due > 0 ? 'Pending' : 'Clear';

            list.innerHTML += `
                <div class="card">
                    <h3>${c.name}</h3>
                    <p class="${statusClass}">₹ ${c.due.toLocaleString()} ${statusText}</p>
                    <button class="delete-btn" onclick="deleteClient(${index})">
                        <i class="fa-solid fa-trash-can"></i> Delete
                    </button>
                </div>
            `;
        });

        document.getElementById("totalAmount").innerText = "₹ " + grandTotal.toLocaleString();
        localStorage.setItem("clients", JSON.stringify(clients));
    }

    function addClient(){
        const name = prompt("Enter Client/Shop Name:");
        if(!name) return;
        
        const dueInput = prompt("Enter Opening Balance (Due):", "0");
        if(dueInput === null) return;
        
        const due = parseFloat(dueInput) || 0;

        clients.push({name: name, due: due});
        render();
    }

    function deleteClient(index){
        if(confirm("Are you sure you want to remove this client?")){
            clients.splice(index, 1);
            render();
        }
    }

    function go(page){ window.location.href = page; }

    function logout() {
        localStorage.removeItem("loggedIn");
        window.location.replace("index.html");
    }

    // Initial render
    render();
</script>

</body>
</html>
