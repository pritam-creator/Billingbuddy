<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Invoice - Surjya Bakery</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* ===== GLOBAL THEME ===== */
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        body{
            background: linear-gradient(135deg,#667eea,#764ba2,#ec4899);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            color: #fff; min-height: 100vh; overflow-x: hidden;
        }
        @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

        .app{ display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar{
            width: 260px; backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 20px 15px; display: flex; flex-direction: column;
            position: fixed; height: 100%; z-index: 1000;
        }
        .menu{ list-style: none; margin-top: 20px; }
        .menu li{
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 8px; cursor: pointer; transition: 0.3s; opacity: 0.8;
        }
        .menu li:hover{ background: rgba(255,255,255,0.2); opacity: 1; }
        .menu li.active{ background: rgba(255,255,255,0.25); border-left: 4px solid #fff; opacity: 1; }

        /* MAIN CONTENT */
        .content{ flex: 1; padding: 30px; margin-left: 260px; }

        .glass-card{
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 20px; margin-bottom: 20px;
        }

        input{
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.2); color: white; outline: none; margin-top: 5px;
        }

        .grid-3{ display: grid; grid-template-columns: 2.5fr 1fr 1fr auto; gap: 10px; align-items: end; }
        
        table{ width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td{ padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .btn{ padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-add{ background: #2ecc71; color: white; height: 45px; }
        .btn-save{ background: #3498db; color: white; width: 100%; margin-top: 10px; }
        .btn-share{ background: #fff; color: #764ba2; width: 100%; margin-top: 10px; }

        @media(max-width: 768px){
            .sidebar{ display: none; }
            .content{ margin-left: 0; padding: 15px; }
            .grid-3{ grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <h3 style="text-align: center; margin-bottom: 20px;">SURJYA BAKERY</h3>
        <ul class="menu">
            <li onclick="location.href='dashboard.html'"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li class="active"><i class="fa-solid fa-file-invoice"></i> Invoice</li>
            <li onclick="location.href='orders.html'"><i class="fa-solid fa-list"></i> Orders</li>
            <li onclick="location.href='employees.html'"><i class="fa-solid fa-users"></i> Employees</li>
        </ul>
    </aside>

    <main class="content">
        <header style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <button class="btn" style="background:rgba(255,255,255,0.2); color:#fff;" onclick="location.href='dashboard.html'"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <h2 id="invNo">Invoice #...</h2>
        </header>

        <div class="glass-card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input id="custName" placeholder="Customer Name">
                <input id="custPhone" placeholder="Phone Number">
            </div>
        </div>

        <div class="glass-card grid-3">
            <input id="itemName" placeholder="Item Name">
            <input id="itemQty" type="number" placeholder="Qty">
            <input id="itemPrice" type="number" placeholder="Price">
            <button class="btn btn-add" onclick="addItem()">Add</button>
        </div>

        <div class="glass-card" style="padding: 0; overflow: hidden;">
            <table>
                <thead><tr style="background: rgba(255,255,255,0.1);"><th>Item</th><th>Qty</th><th>Total</th><th>Action</th></tr></thead>
                <tbody id="cartTable"></tbody>
            </table>
        </div>

        <div class="glass-card" style="max-width: 400px; margin-left: auto;">
            <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; color: #2ecc71;">
                <span>Grand Total:</span>
                <span>₹ <span id="gTotal">0</span></span>
            </div>
            <button class="btn btn-save" onclick="saveData()"><i class="fa-solid fa-floppy-disk"></i> Save Order</button>
            <button class="btn btn-share" onclick="generateAndShare()"><i class="fa-solid fa-share-nodes"></i> Share & Download</button>
        </div>
    </main>
</div>

<script>
    let cart = [];
    let invID = localStorage.getItem("lastInv") ? parseInt(localStorage.getItem("lastInv")) + 1 : 1001;
    document.getElementById("invNo").innerText = "Invoice #" + invID;

    function addItem() {
        const name = document.getElementById("itemName").value;
        const qty = document.getElementById("itemQty").value;
        const price = document.getElementById("itemPrice").value;

        if(!name || !qty || !price) return alert("Fill all fields");

        cart.push({ name, qty: parseInt(qty), price: parseFloat(price), total: qty * price });
        render();
        document.getElementById("itemName").value = "";
        document.getElementById("itemQty").value = "";
        document.getElementById("itemPrice").value = "";
    }

    function render() {
        const tbody = document.getElementById("cartTable");
        tbody.innerHTML = "";
        let grand = 0;
        cart.forEach((item, i) => {
            grand += item.total;
            tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>₹${item.total}</td><td onclick="remove(${i})" style="color:#ff4d6d; cursor:pointer;"><i class="fa-solid fa-trash"></i></td></tr>`;
        });
        document.getElementById("gTotal").innerText = grand;
    }

    function remove(i) { cart.splice(i, 1); render(); }

    function saveData() {
        if(cart.length === 0) return alert("Cart empty");
        const order = { id: invID, customer: document.getElementById("custName").value || "Grahak", total: document.getElementById("gTotal").innerText, date: new Date().toLocaleDateString(), items: cart };
        let orders = JSON.parse(localStorage.getItem("orders")) || [];
        orders.push(order);
        localStorage.setItem("orders", JSON.stringify(orders));
        localStorage.setItem("lastInv", invID);
        alert("Order Saved!");
        location.reload();
    }

    async function generateAndShare() {
        if(cart.length === 0) return alert("Cart empty");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const cName = document.getElementById("custName").value || "Customer";

        // PDF Content
        doc.setFillColor(102, 126, 234);
        doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255, 255, 255);
        doc.text("SURJYA BAKERY - INVOICE", 20, 20);
        
        doc.setTextColor(0, 0, 0);
        doc.text(`Invoice: #${invID}`, 20, 45);
        doc.text(`Customer: ${cName}`, 20, 55);
        
        let y = 70;
        doc.text("Item", 20, y); doc.text("Qty", 100, y); doc.text("Total", 160, y);
        doc.line(20, y+2, 190, y+2);
        
        cart.forEach(item => {
            y += 10;
            doc.text(item.name, 20, y);
            doc.text(item.qty.toString(), 100, y);
            doc.text("Rs. " + item.total, 160, y);
        });

        doc.setFontSize(16);
        doc.text("Total: Rs. " + document.getElementById("gTotal").innerText, 140, y + 20);

        // SHARE LOGIC
        const pdfBlob = doc.output('blob');
        const fileName = `Invoice_${invID}.pdf`;
        const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'Surjya Bakery Invoice',
                    text: `Invoice for ${cName}`
                });
            } catch (err) { doc.save(fileName); }
        } else {
            doc.save(fileName); // Fallback for Desktop
        }
    }
</script>
</body>
</html>
