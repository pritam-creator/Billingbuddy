<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Invoice - Surjya Bakery</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* ===== CONSISTENT THEME ===== */
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

        body{
            background: linear-gradient(135deg,#667eea,#764ba2,#ec4899);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

        .app{ display: flex; height: 100vh; }

        /* SIDEBAR */
        .sidebar{
            width: 260px; backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 20px 15px; display: flex; flex-direction: column;
            position: fixed; height: 100%; transition: 0.3s ease; z-index: 1000;
        }

        .menu{ list-style: none; margin-top: 20px; }
        .menu li{
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 8px; cursor: pointer; transition: 0.3s; opacity: 0.8;
        }
        .menu li:hover{ background: rgba(255,255,255,0.2); opacity: 1; }
        .menu li.active{ background: rgba(255,255,255,0.25); border-left: 4px solid #fff; opacity: 1; }

        /* MAIN CONTENT */
        .content{ flex: 1; padding: 30px; margin-left: 260px; overflow-y: auto; padding-bottom: 0px; }

        /* HEADER */
        .top-header{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn{ background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* BILLING FORM */
        .glass-card{
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 20px; margin-bottom: 20px;
        }

        .grid-3{ display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; align-items: end; }
        
        input{
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.2); color: white; outline: none; margin-top: 5px;
        }
        input::placeholder{ color: rgba(255,255,255,0.6); }

        .label-text{ font-size: 12px; opacity: 0.8; margin-left: 5px; }

        /* TABLE */
        .table-container{ overflow-x: auto; border-radius: 15px; background: rgba(255,255,255,0.1); }
        table{ width: 100%; border-collapse: collapse; text-align: left; }
        th, td{ padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th{ background: rgba(255,255,255,0.1); font-size: 14px; }

        /* SUMMARY & ACTIONS */
        .summary-box{ display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .totals{ flex: 1; min-width: 250px; }
        .total-row{ display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .grand-total{ font-size: 22px; font-weight: bold; color: #2ecc71; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }

        .btn{ padding: 12px 20px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add{ background: #2ecc71; color: white; height: 45px; }
        .btn-save{ background: #3498db; color: white; width: 100%; margin-top: 15px; }
        .btn-pdf{ background: #fff; color: #764ba2; width: 100%; margin-top: 10px; }
        
        .delete-btn{ color: #ff6b81; cursor: pointer; background: none; border: none; font-size: 18px; }

        /* BOTTOM NAV (Mobile) */
        .bottom-nav{
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
            display: none; justify-content: space-around; padding: 12px; z-index: 1000;
        }

        @media(max-width: 768px){
            .sidebar{ display: none; }
            .content{ margin-left: 0; padding: 15px; }
            .grid-3{ grid-template-columns: 1fr; }
            .bottom-nav{ display: flex; }
        }
    </style>
</head>

<body>

<div class="app">
    <aside class="sidebar">
        <div style="padding: 10px; text-align: center;">
            <h3 style="letter-spacing: 1px;">SURJYA BAKERY</h3>
        </div>
        <ul class="menu">
            <li onclick="go('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li onclick="go('items.html')"><i class="fa-solid fa-box"></i> Items</li>
            <li class="active"><i class="fa-solid fa-file-invoice"></i> Invoice</li>
            <li onclick="go('clients.html')"><i class="fa-solid fa-users"></i> Clients</li>
            <li onclick="go('orders.html')"><i class="fa-solid fa-list"></i> Orders</li>
        </ul>
    </aside>

    <main class="content">
        <header class="top-header">
            <button class="back-btn" onclick="go('dashboard.html')"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <h2 id="invoiceDisplayNo">Invoice Loading...</h2>
            <div style="width: 40px;"></div>
        </header>

        <div class="glass-card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <span class="label-text">Customer Name</span>
                    <input id="customerName" placeholder="Ex: Rahul Kumar">
                </div>
                <div>
                    <span class="label-text">Phone Number</span>
                    <input id="customerPhone" placeholder="Ex: 9876543210">
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="grid-3">
                <div>
                    <span class="label-text">Item Name</span>
                    <input id="item" placeholder="Type item...">
                </div>
                <div>
                    <span class="label-text">Qty</span>
                    <input id="qty" type="number" placeholder="0">
                </div>
                <div>
                    <span class="label-text">Price</span>
                    <input id="price" type="number" placeholder="₹">
                </div>
                <button class="btn btn-add" onclick="addItem()"><i class="fa-solid fa-plus"></i> Add</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Item Description</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="invoiceItems"></tbody>
            </table>
        </div>

        <div class="summary-box">
            <div style="flex: 1;"></div> <div class="totals glass-card">
                <div class="total-row">
                    <span>Subtotal</span>
                    <span>₹ <span id="subtotal">0</span></span>
                </div>
                <div class="total-row">
                    <span>Discount (%)</span>
                    <input id="discount" type="number" value="0" style="width: 60px; margin: 0; padding: 5px;">
                </div>
                <div class="total-row">
                    <span>GST (5%)</span>
                    <span>₹ <span id="gst">0</span></span>
                </div>
                <div class="total-row grand-total">
                    <span>Grand Total</span>
                    <span>₹ <span id="grandTotal">0</span></span>
                </div>
                
                <button class="btn btn-save" onclick="saveInvoiceFinal()">
                    <i class="fa-solid fa-floppy-disk"></i> Save to Records
                </button>
                <button class="btn btn-pdf" onclick="generatePDF()">
                    <i class="fa-solid fa-file-pdf"></i> Download PDF
                </button>
            </div>
        </div>
    </main>
</div>

<nav class="bottom-nav">
    <div onclick="go('dashboard.html')"><i class="fa-solid fa-house"></i></div>
    <div onclick="go('items.html')"><i class="fa-solid fa-box"></i></div>
    <div style="color: #fff;"><i class="fa-solid fa-file-invoice"></i></div>
    <div onclick="go('orders.html')"><i class="fa-solid fa-list-check"></i></div>
</nav>

<script>
    /* 🔐 SESSION PROTECTION */
    if(localStorage.getItem("loggedIn") !== "true") window.location.replace("index.html");

    let invoice = [];
    let counter = parseInt(localStorage.getItem("invoiceCounter")) || 101;

    function go(page) { window.location.href = page; }

    function updateInvoiceNo() {
        let code = `SB-2024-${counter}`;
        document.getElementById("invoiceDisplayNo").innerText = "🧾 " + code;
        return code;
    }

    function addItem() {
        const name = document.getElementById("item").value;
        const qty = parseInt(document.getElementById("qty").value);
        const price = parseFloat(document.getElementById("price").value);

        if(!name || !qty || !price) { alert("Please fill item details"); return; }

        invoice.push({ name, qty, price });
        renderInvoice();
        
        // Reset inputs
        document.getElementById("item").value = "";
        document.getElementById("qty").value = "";
        document.getElementById("price").value = "";
    }

    function renderInvoice() {
        const tbody = document.getElementById("invoiceItems");
        tbody.innerHTML = "";
        let subtotal = 0;

        invoice.forEach((item, index) => {
            let itemTotal = item.qty * item.price;
            subtotal += itemTotal;
            tbody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>₹${item.price}</td>
                    <td>₹${itemTotal}</td>
                    <td><button class="delete-btn" onclick="removeItem(${index})"><i class="fa-solid fa-circle-xmark"></i></button></td>
                </tr>
            `;
        });

        calculateTotals(subtotal);
    }

    function calculateTotals(subtotal) {
        let discPercent = parseFloat(document.getElementById("discount").value) || 0;
        let discAmount = (subtotal * discPercent) / 100;
        let taxable = subtotal - discAmount;
        let gst = taxable * 0.05;
        let grand = taxable + gst;

        document.getElementById("subtotal").innerText = subtotal.toLocaleString();
        document.getElementById("gst").innerText = gst.toFixed(2);
        document.getElementById("grandTotal").innerText = grand.toFixed(2);
    }

    function removeItem(index) {
        invoice.splice(index, 1);
        renderInvoice();
    }

    document.getElementById("discount").oninput = renderInvoice;

    function saveInvoiceFinal() {
    if(invoice.length === 0) return alert("Pehle items add karein!");

    const newOrder = {
        id: counter,
        customer: document.getElementById("customerName").value || "Grahak",
        total: document.getElementById("grandTotal").innerText,
        date: new Date().toLocaleDateString(),
        status: "Pending",
        items: invoice
    };

    // 1. Orders list mein bhejo
    let allOrders = JSON.parse(localStorage.getItem("orders")) || [];
    allOrders.push(newOrder);
    localStorage.setItem("orders", JSON.stringify(allOrders));

    // 2. Records (Transaction) mein bhejo
    let allRecords = JSON.parse(localStorage.getItem("bakeryRecords")) || [];
    allRecords.push({
        title: "Bill #" + counter,
        amount: parseFloat(newOrder.total),
        date: newOrder.date
    });
    localStorage.setItem("bakeryRecords", JSON.stringify(allRecords));

    alert("Order Saved! Ab ye Orders aur Records page par dikhega.");
    location.reload(); 
}


    async function generatePDF() {
        if(invoice.length === 0) return alert("Cart is empty");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // PDF Styling logic same as before but with better colors
        doc.setFillColor(99, 102, 241);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(24);
        doc.text("SURJYA BAKERY", 20, 25);
        
        doc.setTextColor(0,0,0);
        doc.setFontSize(10);
        doc.text("Invoice: " + updateInvoiceNo(), 150, 55);
        doc.text("Customer: " + (document.getElementById("customerName").value || "Walk-in"), 20, 55);

        // Simple Table
        let y = 70;
        doc.text("Item", 20, y); doc.text("Qty", 100, y); doc.text("Total", 160, y);
        doc.line(20, y+2, 190, y+2);
        
        y += 10;
        invoice.forEach(item => {
            doc.text(item.name, 20, y);
            doc.text(item.qty.toString(), 100, y);
            doc.text("Rs. " + (item.qty*item.price), 160, y);
            y += 8;
        });

        doc.save("Invoice_" + counter + ".pdf");
    }

    updateInvoiceNo();
</script>

</body>
</html>
