<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>New Surjya Bakery - Invoice</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{
background: linear-gradient(135deg,#667eea,#764ba2,#ec4899);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
color:#fff;min-height:100vh;
}
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.app{display:flex;min-height:100vh;}
.sidebar{
width:260px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.08);
border-right:1px solid rgba(255,255,255,0.2);
padding:20px 15px;
position:fixed;
height:100%;
}
.content{flex:1;padding:25px;margin-left:260px;}
.glass-card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
padding:20px;
margin-bottom:20px;
}
input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.2);
color:white;
outline:none;
margin-top:5px;
}
.grid-input{
display:grid;
grid-template-columns:2fr 1fr 1fr auto;
gap:10px;
align-items:end;
}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.1);}
.btn-main{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
@media(max-width:768px){
.sidebar{display:none;}
.content{margin-left:0;padding:15px;}
.grid-input{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="app">

<aside class="sidebar">
<h3 style="text-align:center;margin-bottom:30px;">NEW SURJYA BAKERY</h3>
<ul style="list-style:none;">
<li style="padding:12px;cursor:pointer;" onclick="window.location.href='dashboard.html'">
<i class="fa-solid fa-house"></i> Dashboard
</li>
<li style="padding:12px;background:rgba(255,255,255,0.2);border-radius:10px;">
<i class="fa-solid fa-file-invoice"></i> Invoice
</li>
</ul>
</aside>

<main class="content">

<h2 style="margin-bottom:20px;">Professional Invoice</h2>

<div class="glass-card">
<input id="custName" placeholder="Client Name">
<input id="custAddr" placeholder="Client Address">
</div>

<div class="glass-card grid-input">
<input id="iName" placeholder="Item Name">
<input id="iQty" type="number" placeholder="Qty">
<input id="iPrice" type="number" placeholder="Price">
<button class="btn-main" style="background:#2ecc71;margin:0;" onclick="addItem()">
<i class="fa-solid fa-plus"></i>
</button>
</div>

<div class="glass-card" style="padding:0;">
<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div style="max-width:400px;margin-left:auto;">
<div class="glass-card" style="display:flex;justify-content:space-between;font-size:20px;font-weight:bold;">
<span>Grand Total:</span>
<span>₹ <span id="totalText">0.00</span></span>
</div>

<button class="btn-main" style="background:white;color:black;" onclick="sharePDF()">
<i class="fa-solid fa-download"></i> Download Invoice PDF
</button>
</div>

</main>
</div>

<script>
let items=[];
let invNo="NSB-"+Math.floor(1000+Math.random()*9000);

const custName=document.getElementById("custName");
const custAddr=document.getElementById("custAddr");
const iName=document.getElementById("iName");
const iQty=document.getElementById("iQty");
const iPrice=document.getElementById("iPrice");
const tableBody=document.getElementById("tableBody");
const totalText=document.getElementById("totalText");

function addItem(){
const name=iName.value.trim();
const qty=parseFloat(iQty.value);
const price=parseFloat(iPrice.value);

if(!name || isNaN(qty) || isNaN(price) || qty<=0 || price<=0){
alert("Enter valid item details");
return;
}

items.push({name,qty,price,total:qty*price});
render();

iName.value="";
iQty.value="";
iPrice.value="";
}

function render(){
let grand=0;
tableBody.innerHTML="";

items.forEach((it,index)=>{
grand+=it.total;

tableBody.innerHTML+=`
<tr>
<td>${it.name}</td>
<td>${it.qty}</td>
<td>₹${it.price.toFixed(2)}</td>
<td>₹${it.total.toFixed(2)}</td>
<td onclick="removeItem(${index})">
<i class="fa-solid fa-trash" style="color:red;cursor:pointer;"></i>
</td>
</tr>`;
});

totalText.innerText=grand.toFixed(2);
}

function removeItem(index){
if(confirm("Remove item?")){
items.splice(index,1);
render();
}
}

async function sharePDF(){

if(items.length===0)return alert("Items empty!");
if(!custName.value.trim())return alert("Enter client name!");

const {jsPDF}=window.jspdf;
const doc=new jsPDF();
const pageWidth=doc.internal.pageSize.getWidth();
const pageHeight=doc.internal.pageSize.getHeight();

// Header
doc.setFillColor(72,187,180);
doc.rect(0,0,pageWidth,60,'F');

// Safe Logo Load
try{
const img=new Image();
img.src="logo.png";
await new Promise((resolve,reject)=>{
img.onload=resolve;
img.onerror=reject;
});
doc.addImage(img,'PNG',150,10,40,40);
}catch(e){}

// Title
doc.setFontSize(28);
doc.setTextColor(255);
doc.text("INVOICE",20,35);

// Company Info
doc.setTextColor(0);
doc.setFontSize(11);
doc.text("New Surjya Bakery",20,75);
doc.text("Churaibari, North Tripura - 799262",20,82);
doc.text("Phone: 7085662649",20,89);

doc.text("Invoice No: "+invNo,140,75);
doc.text("Date: "+new Date().toLocaleDateString(),140,82);

// Bill To
doc.setFont(undefined,'bold');
doc.text("Bill To:",20,105);
doc.setFont(undefined,'normal');
doc.text(custName.value,20,112);
doc.text(custAddr.value||"",20,119);

// Table
let y=135;
doc.setFont(undefined,'bold');
doc.text("Item",20,y);
doc.text("Qty",110,y);
doc.text("Price",135,y);
doc.text("Total",165,y);
doc.line(20,y+2,190,y+2);
doc.setFont(undefined,'normal');

items.forEach(it=>{
y+=12;
if(y>270){doc.addPage();y=20;}
doc.text(it.name,20,y);
doc.text(it.qty.toString(),110,y);
doc.text(it.price.toFixed(2),135,y);
doc.text(it.total.toFixed(2),165,y);
});

y+=15;
doc.setFont(undefined,'bold');
doc.setFontSize(14);
doc.text("Grand Total: ₹ "+totalText.innerText,120,y);

// Footer dynamic
doc.setFontSize(14);
doc.setTextColor(100);
doc.text("Thank You For Your Business!",20,pageHeight-10);

doc.save("New_Surjya_Bakery_Invoice.pdf");
}
</script>

</body>
</html>
